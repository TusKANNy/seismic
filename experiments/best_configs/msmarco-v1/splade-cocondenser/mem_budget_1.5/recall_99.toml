name = "splade-cocodenser_recall_99"
title = "Seismic Splade-cocodenser - Recall 99%"
description = "Optimized configuration for splade-cocodenser targeting recall 99% from grid search"
dataset = "Splade-cocodenser on MS-MARCO"

[settings]
k = 10
n-runs = 1
build = true
metric = "RR@10"
delete = true

[folder]
data = "~/knn_datasets/sparse_datasets/msmarco_v1_passage/cocondenser/data"
index = "~/knn_indexes/sparse_datasets/msmarco_v1_passage/cocondenser/indexes"
qrels_path = "~/knn_datasets/sparse_datasets/msmarco_v1_passage/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "splade-cocodenser_recall_99"

[indexing_parameters]
n-postings = 3000
centroid-fraction = 0.1
summary-energy = 0.4
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 6.0
min-cluster-size = 10
pruning-strategy = "global-threshold"
value-type = "f16"

[query]

[query.recall_99]
query-cut = 8
heap-factor = 0.7
