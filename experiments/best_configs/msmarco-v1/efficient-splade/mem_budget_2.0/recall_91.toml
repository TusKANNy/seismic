name = "efficient-splade_recall_91"
title = "Seismic Efficient-splade - Recall 91%"
description = "Optimized configuration for efficient-splade targeting recall 91% from grid search"
dataset = "Efficient-splade on MS-MARCO"

[settings]
k = 10
n-runs = 1
build = true
metric = "RR@10"
delete = true

[folder]
data = "~/knn_datasets/sparse_datasets/msmarco_v1_passage/efficient-splade/data"
index = "~/knn_indexes/sparse_datasets/msmarco_v1_passage/efficient-splade/indexes"
qrels_path = "~/knn_datasets/sparse_datasets/msmarco_v1_passage/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "efficient-splade_recall_91"

[indexing_parameters]
n-postings = 2000
centroid-fraction = 0.2
summary-energy = 0.5
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 2.0
min-cluster-size = 2
pruning-strategy = "global-threshold"
value-type = "dotvbyte"

[query]

[query.recall_91]
query-cut = 6
heap-factor = 1.0
