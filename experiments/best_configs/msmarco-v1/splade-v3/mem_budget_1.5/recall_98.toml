name = "splade-v3_recall_98"
title = "Seismic Splade-v3 - Recall 98%"
description = "Optimized configuration for splade-v3 targeting recall 98% from grid search"
dataset = "Splade-v3 on MS-MARCO"

[settings]
k = 10
n-runs = 1
build = true
metric = "RR@10"
delete = true

[folder]
data = "~/knn_datasets/sparse_datasets/msmarco_v1_passage/splade-v3/data"
index = "~/knn_indexes/sparse_datasets/msmarco_v1_passage/splade-v3/indexes"
qrels_path = "~/knn_datasets/sparse_datasets/msmarco_v1_passage/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "splade-v3_recall_98"

[indexing_parameters]
n-postings = 2000
centroid-fraction = 0.2
summary-energy = 0.5
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 6.0
min-cluster-size = 2
pruning-strategy = "global-threshold"
value-type = "f16"

[query]

[query.recall_98]
query-cut = 7
heap-factor = 0.9
