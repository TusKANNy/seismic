name = "cocondenser_recall_94"
title = "Seismic Cocondenser - Recall 94%"
description = "Optimized configuration for cocondenser targeting recall 94% from grid search"
dataset = "Cocondenser on MS-MARCO"

[settings]
k = 10
n-runs = 1
NUMA = "numactl --physcpubind='0' --localalloc"
build = true
metric = "RR@10"
delete = true

[folder]
data = "~/knn_datasets/sparse_datasets/msmarco_v2_passage/cocondenser/data"
index = "~/knn_indexes/sparse_datasets/msmarco_v2_passage/cocondenser/"
qrels_path = "~/knn_datasets/sparse_datasets/msmarco_v2_passage/qrels.dev1.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "cocondenser_recall_94"

[indexing_parameters]
n-postings = 40000
centroid-fraction = 0.2
summary-energy = 0.4
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 4.0
min-cluster-size = 2
pruning-strategy = "global-threshold"
value-type = "f16"

[query]

[query.recall_94]
query-cut = 4
heap-factor = 0.8
first_sorted = false
