name = "splade-v3_recall_91"
title = "Seismic Splade-v3 - Recall 91%"
description = "Optimized configuration for splade-v3 targeting recall 91% from grid search"
dataset = "Splade-v3 on MS-MARCO"

[settings]
k = 10
n-runs = 1
build = true
metric = "RR@10"
delete = true

[folder]
data = "/data/cosimorulli/splade_v3/data"
index = "/data/cosimorulli/splade-v3/indexes"
qrels_path = "/data/cosimorulli/qrels.dev.small.tsv"
experiment = "."

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "splade-v3_recall_91"

[indexing_parameters]
n-postings = 2000
centroid-fraction = 0.2
summary-energy = 0.5
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 3.0
min-cluster-size = 2
pruning-strategy = "global-threshold"
value-type = "f16"

[query]

[query.recall_91]
query-cut = 4
heap-factor = 1.0
