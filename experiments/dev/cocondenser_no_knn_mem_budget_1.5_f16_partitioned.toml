name =          "cocondenser_no_knn_mem_budget_1.5_partitioned"
title =         "Seismic with no knn on Cocondenser with memory budget 1.5 on MS MARCO"
description =   "Seismic with no knn on Cocondenser equivalent to memory budget 1.5 on MS MARCO but partitioned index to improve space usage"
dataset =       "Splade cocondenser on MS-MARCO"
compile-command = "export SEISMIC_N_PARTITIONS=128; export SEISMIC_N_COMPONENT_BITS=8; RUSTFLAGS=\"-C target-cpu=native\" cargo build --release --features partitioned-dataset" # Compile in debug mode? default is release mode
build-command = "./target/release/build_inverted_index_partitioned"
query-command = "./target/release/perf_inverted_index_partitioned"

[settings]
k =             10
n-runs =        1       # Number of runs. PLEASE think carefully how increasing 
                        # this may influence your query time
# NUMA =        ""      # "numactl --physcpubind='0-15' --localalloc"    # Is the machine NUMA and need to prepend "numactl --physcpubind='0-15' --localalloc" to query command? Otherwise comment this!
build =         true  # Need to build the index or the index is already built?
metric =        "RR@10"

[folder] 
data =          "~/knn_datasets/sparse_datasets/msmarco_v1_passage/cocondenser/data"
index =         "~/knn_indexes/sparse_indexes/msmarco_v1_passage/cocondenser/indexes"
qrels_path =    "~/knn_datasets/sparse_datasets/msmarco_v1_passage/qrels.dev.small.tsv"
experiment =    "."     # stdout and stderr here of running the experiment is saved here. in a specific subfolder for the current execution

[filename]
dataset =       "documents.bin"
queries =       "queries.bin"
groundtruth =   "groundtruth.tsv"
doc_ids =       "doc_ids.npy"
query_ids =     "queries_ids.npy"
index =         "cikm_2024_cocondenser_no_knn_mem_budget_1.5_fixedu16"

[indexing_parameters]
n-postings =            3000
centroid-fraction =     0.1
summary-energy =        0.4
knn =                   0
clustering-algorithm = "random-kmeans-inverted-index-approx" #, "random-kmeans-inverted-index-approx"
kmeans-doc-cut =        15    # needed by "random-kmeans-inverted-index" and "random-kmeans-inverted-index-approx"
kmeans-pruning-factor = 0.005 # Only used by random-kmeans-inverted-index
value-type =   "f16"

[query]
    [query.recall_90]
    query-cut =         4
    heap-factor =       0.89

    [query.recall_91]
    query-cut =         6
    heap-factor =       0.89
    
    [query.recall_92]
    query-cut =         10
    heap-factor =       0.89

    [query.recall_93]
    query-cut =         5
    heap-factor =       0.79

    [query.recall_94]
    query-cut =         6  
    heap-factor =       0.79

    [query.recall_95]
    query-cut =         13
    heap-factor =       0.79

    [query.recall_96]
    query-cut =         11
    heap-factor =       0.69