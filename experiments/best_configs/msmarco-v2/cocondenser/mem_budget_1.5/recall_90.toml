name = "cocondenser_recall_90"
title = "Seismic Cocondenser - Recall 90%"
description = "Optimized configuration for cocondenser targeting recall 90% from grid search"
dataset = "Cocondenser on MS-MARCO"

[settings]
k = 10
n-runs = 1
NUMA = "numactl --physcpubind='0' --localalloc"
build = true
metric = "RR@10"
delete = true

[folder]
data = ""
index = ""
qrels_path = ""
experiment = ""

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "cocondenser_recall_90"

[indexing_parameters]
n-postings = 30000
centroid-fraction = 0.2
summary-energy = 0.5
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 4.0
min-cluster-size = 2
pruning-strategy = "global-threshold"
value-type = "fixedu8"

[query]

[query.recall_90]
query-cut = 4
heap-factor = 0.9
first_sorted = true
