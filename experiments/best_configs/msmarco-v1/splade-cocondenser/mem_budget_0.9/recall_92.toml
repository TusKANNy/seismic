name = "_recall_92"
title = "Seismic  - Recall 92%"
description = "Optimized configuration for  targeting recall 92% from grid search"
dataset = " on MS-MARCO"

[settings]
k = 10
n-runs = 1
build = true
metric = "RR@10"
delete = true

[folder]
data = ""
index = ""
qrels_path = ""
experiment = ""

[filename]
dataset = "documents.bin"
queries = "queries.bin"
groundtruth = "groundtruth.tsv"
doc_ids = "doc_ids.npy"
query_ids = "queries_ids.npy"
index = "_recall_92"

[indexing_parameters]
n-postings = 2000
centroid-fraction = 0.2
summary-energy = 0.4
knn = 0
clustering-algorithm = "random-kmeans-inverted-index-approx"
kmeans-doc-cut = 15
kmeans-pruning-factor = 0.0
max-fraction = 3.0
min-cluster-size = 5
pruning-strategy = "global-threshold"
value-type = "dotvbyte"

[query]

[query.recall_92]
query-cut = 4
heap-factor = 0.8
